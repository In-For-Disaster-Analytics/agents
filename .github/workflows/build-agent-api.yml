name: build-agent-api

# Build and push the CKAN Agent API image to GHCR, then
# register or restart the dso-agent-api pod on portals.tapis.io.
#
# Required GitHub secrets:
#   TAPIS_USERNAME    — Tapis portal username
#   TAPIS_PASSWORD    — Tapis portal password
#
# Optional pod env-var secrets (add as needed):
#   OPENAI_API_KEY    — OpenAI API key for LangGraph agents
#   CKAN_PORTAL_URL   — CKAN portal base URL
#
# NOTE: CKAN auth tokens are Tapis JWTs (6-hour TTL) and cannot be stored
# as static secrets. The pod exposes /v1/auth/login — clients exchange their
# Tapis username/password for a short-lived JWT and pass it as
# Authorization: Bearer <token> on every request.
#
# The GHCR package must be set to PUBLIC so Tapis pods can pull it
# without image-pull credentials. Set this once via:
#   GitHub → Packages → dso-agent-api → Package settings → Change visibility
#
# Build context: repo root (Dockerfile copies from ckan-agent-api/ and ckan-registration/)

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "ckan-agent-api/**"
      - "ckan-registration/**"
      - ".github/workflows/build-agent-api.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "Dockerfile"
      - "ckan-agent-api/**"
      - "ckan-registration/**"
      - ".github/workflows/build-agent-api.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/dso-agent-api
  POD_ID: dso-agent-api
  TAPIS_BASE: https://portals.tapis.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Tapis Configure
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Tapis pod
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          TAPIS_USERNAME: ${{ secrets.TAPIS_USERNAME }}
          TAPIS_PASSWORD: ${{ secrets.TAPIS_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CKAN_URL: ${{ secrets.CKAN_PORTAL_URL }}
        run: |
          pip install --quiet tapipy
          python3 - <<'PYEOF'
import os, sys
from tapipy.tapis import Tapis

base_url   = "https://portals.tapis.io"
username   = os.environ["TAPIS_USERNAME"]
password   = os.environ["TAPIS_PASSWORD"]
pod_id     = os.environ["POD_ID"]
image      = os.environ["IMAGE"].lower() + ":latest"
openai_key = os.environ.get("OPENAI_API_KEY", "")
ckan_url   = os.environ.get("CKAN_URL", "")

print(f"Authenticating to {base_url} as {username}")
t = Tapis(base_url=base_url, username=username, password=password)
t.get_tokens()
print("Token obtained.")

pod_exists = False
try:
    t.pods.getPod(pod_id=pod_id)
    pod_exists = True
except Exception as e:
    status = getattr(getattr(e, "response", None), "status_code", None)
    if status == 404:
        pod_exists = False
    else:
        print(f"Error checking pod: {e}", file=sys.stderr)
        sys.exit(1)

if pod_exists:
    print(f"Pod {pod_id} exists — restarting to pick up new image")
    t.pods.restartPod(pod_id=pod_id)
    print("Restart requested.")
else:
    print(f"Pod {pod_id} not found — creating")
    t.pods.createPod(
        pod_id=pod_id,
        image=image,
        description="CKAN Agent API (FastAPI + LangGraph)",
        environment_variables={
            "CKAN_AGENT_API_HOST": "0.0.0.0",
            "CKAN_AGENT_API_PORT": "8787",
            "OPENAI_API_KEY": openai_key,
            "CKAN_URL": ckan_url,
        },
        networking={"protocol": "http", "port": 8787},
    )
    print(f"Pod {pod_id} created.")
PYEOF

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## dso-agent-api build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tapis pod: \`${POD_ID}\` on \`portals.tapis.io\`" >> "$GITHUB_STEP_SUMMARY"
