name: generic_ckan
description: >
  Generic CKAN dataset schema for general-purpose datasets that do not fit a
  domain-specific profile.
when_to_use: >
  Use for arbitrary files, software, PDFs, or tabular/spatial data when no
  domain-specific schema profile applies. No mandatory domain categories or
  collection method are imposed.
dataset_type: dataset

defaults: {}

controlled_vocab: {}

fields:
  - {key: title, required: true, guidance: "Human-readable dataset title (under 140 chars)."}
  - {key: name, required: true, guidance: "Lowercase, hyphenated, URL-safe slug."}
  - {key: notes, label: [description, abstract, summary], required: true, guidance: "1-3 sentences describing content, source, and purpose."}
  - {key: url, required: false, guidance: "Source/landing-page URL if any."}
  - {key: author, required: false, guidance: "Org-level; reuse a thread-sticky value if provided."}
  - {key: author_email, label: email, required: false, guidance: null}
  - {key: maintainer, required: false, guidance: "Org-level; reuse a thread-sticky value if provided."}
  - {key: maintainer_email, required: false, guidance: null}
  - {key: license_id, label: license, required: false, guidance: "Dataset-specific; do not inherit across unrelated datasets."}
  - {key: owner_org, label: [organization, org], required: false, guidance: "Org-level; reuse a thread-sticky value if provided."}
  - {key: tag_string, label: [tags, keywords], required: false, guidance: "Comma-separated discovery tags."}
  - {key: version, required: false, guidance: null}
  - {key: spatial, label: [bounding_box, extent, location], required: false, guidance: "GeoJSON string if a bounding box is available."}
  - {key: temporal_coverage_start, label: [start, begin, start_date], required: false, guidance: "ISO-8601; only if a clear period is in the sources."}
  - {key: temporal_coverage_end, label: [end, end_date], required: false, guidance: "ISO-8601; only if a clear period is in the sources."}
