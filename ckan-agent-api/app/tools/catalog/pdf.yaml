tools:
  - name: fetch_remote_pdf
    summary: Download an authenticated remote PDF by URL and extract its text.
    description: >
      Fetches a PDF from an HTTPS URL using the request's Tapis JWT for authentication,
      then extracts and returns the raw page text (up to max_pages / max_chars). Use this
      when a PDF is listed as a remote resource URL rather than a local file path. The Tapis
      JWT is injected server-side — never pass a token as a tool argument.
    category: file
    read_only: true
    handler: app.tools.handlers.remote:fetch_remote_pdf
    args:
      url: {type: string, required: true, description: "HTTPS URL of the remote PDF."}
      page_start: {type: integer, required: false, description: "First page index (0-based, default 0)."}
      max_pages: {type: integer, required: false, description: "Maximum pages to read (default 20)."}
      max_chars: {type: integer, required: false, description: "Character cap on returned text (default 8000)."}
    returns: {type: object, description: "{text, page_count, pages_read, characters_returned, truncated, source_url}."}
    use_when:
      - A PDF is available only as an authenticated remote URL (not a local file path).
    safety: ["HTTPS-only; max 10 MB download; bounded pages/chars; Tapis JWT injected server-side."]

  - name: pdf_summarize
    summary: Summarize a whole PDF report via map-reduce (section summaries combined into one).
    description: >
      Reads a PDF in order, summarizes it section-by-section, then combines those into a single
      document summary covering subject, study area, methods/data, and findings. Use this for any
      report longer than a few pages — it reads far more of the document than file_extract_pdf_text.
    category: file
    read_only: true
    handler: app.tools.handlers.pdf:pdf_summarize
    args:
      path: {type: string, required: true, description: "Local PDF file path."}
    returns: {type: object, description: "{summary, windows, section_summaries, truncated, chars_read}."}
    use_when:
      - The dataset includes a PDF report and you need a faithful description of its full content.
    safety: ["Read-only; bounded pages/chars/windows; needs pypdf; path is size/sensitive-checked."]
